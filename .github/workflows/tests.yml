name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S Firmware -B Firmware/build-tests

      - name: Build tests
        run: cmake --build Firmware/build-tests

      - name: Run tests
        run: ctest --test-dir Firmware/build-tests --verbose